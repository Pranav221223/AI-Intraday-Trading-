<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI-Driven Intraday Trading</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Embedded Custom CSS -->
    <style>
        body {
            background: linear-gradient(to right, #1e3c72, #2a5298); /* Blue gradient background */
            color: #f8f9fa;
            font-family: 'Segoe UI', sans-serif;
        }

        .card {
            background-color: rgba(0, 0, 0, 0.75);
            border-radius: 1rem;
        }

        .card-header {
            border-top-left-radius: 1rem;
            border-top-right-radius: 1rem;
        }

        .form-select, .form-label {
            font-size: 1.1rem;
        }

        .btn-primary {
            background: linear-gradient(to right, #ff416c, #ff4b2b);
            border: none;
        }

        .btn-outline-light:hover, .btn-outline-primary:hover {
            opacity: 0.85;
        }

        .btn-outline-primary {
            border-color: #007bff;
            color: #007bff;
        }

        .btn-outline-primary:hover {
            background-color: #007bff;
            color: white;
        }

        .container {
            max-width: 700px;
        }

        h1 {
            font-size: 2rem;
        }

        h5 span {
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container py-5">

        {% if current_user.is_authenticated %}
            <div class="d-flex justify-content-between mb-3">
                <h5>Welcome, <span class="text-info">{{ current_user.username }}</span></h5>
                <a href="{{ url_for('logout') }}" class="btn btn-outline-light btn-sm">Logout</a>
            </div>
        {% else %}
            <div class="d-flex justify-content-end mb-3">
                <a href="{{ url_for('login') }}" class="btn btn-outline-light btn-sm me-2">Login</a>
                <a href="{{ url_for('register') }}" class="btn btn-outline-primary btn-sm">Register</a>
            </div>
        {% endif %}

        <div class="card shadow-lg border-primary">
            <div class="card-header bg-primary text-white text-center">
                <h1>AI-Driven Intraday Trading</h1>
            </div>
            <div class="card-body">
                <form action="/predict" method="post">
                    <div class="mb-4">
                        <label for="ticker" class="form-label">Select a Stock:</label>
                        <select class="form-select" id="ticker" name="ticker" required>
                            <option value="">-- Choose a Stock --</option>
                            {% for ticker in tickers %}
                                <option value="{{ ticker }}">{{ ticker }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Predict Next Day Price</button>
                </form>

                {% if error %}
                <div class="alert alert-danger mt-4">
                    <strong>Error:</strong> {{ error }}
                </div>
                {% endif %}
            </div>
        </div>
    </div>

    <!-- Bootstrap Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
